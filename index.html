<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-VIDEO EDITOR</title>
<style>
:root{
  --bg:#14151a;
  --panel:#1c1e26;
  --panel2:#23262f;
  --border:#2e3340;
  --text:#e7e9f0;
  --muted:#8b90a0;
  --accent:#7c5cff;
  --accent2:#2dd4bf;
  --amber:#ffb020;
  --danger:#ff5c7a;
  --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  overflow:hidden;user-select:none;}
button{font-family:inherit;}
#app{display:flex;flex-direction:column;height:100vh;}

/* ---------- top bar ---------- */
.topbar{
  height:52px;min-height:52px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;background:var(--panel);border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:26px;height:26px;border-radius:7px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  box-shadow:0 0 0 1px rgba(255,255,255,0.08) inset;}
.brand-text{display:flex;align-items:baseline;gap:6px;line-height:1;}
.brand-main{font-weight:700;font-size:14px;letter-spacing:0.5px;}
.brand-sub{font-size:10.5px;color:var(--muted);letter-spacing:1.5px;font-weight:600;}
.topbar-actions{display:flex;gap:8px;}
.btn{
  display:flex;align-items:center;gap:6px;background:var(--panel2);color:var(--text);
  border:1px solid var(--border);border-radius:7px;padding:7px 12px;font-size:12.5px;
  cursor:pointer;transition:background .12s,border-color .12s;white-space:nowrap;
}
.btn:hover{background:#2a2d38;border-color:#3a3f4e;}
.btn:active{transform:translateY(1px);}
.btn svg{width:14px;height:14px;flex:none;}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn-accent:hover{background:#6c4ce8;}
.btn-icon{padding:7px 9px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ---------- stage ---------- */
.stage-wrap{flex:1;display:flex;min-height:0;border-bottom:1px solid var(--border);}
.media-bin{width:230px;min-width:230px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0;}
.bin-header{padding:10px 12px;font-size:11px;color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;border-bottom:1px solid var(--border);}
.bin-list{flex:1;overflow-y:auto;padding:6px;}
.bin-item{display:flex;gap:8px;padding:6px 22px 6px 6px;border-radius:8px;cursor:pointer;align-items:center;position:relative;}
.bin-item:hover{background:var(--panel2);}
.bin-item:hover .bin-remove{opacity:1;}
.bin-remove{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:5px;
  background:rgba(20,21,26,.85);border:1px solid var(--border);color:var(--muted);
  display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;
  transition:opacity .12s,background .12s,color .12s;flex:none;z-index:2;}
.bin-remove:hover{background:var(--danger);border-color:var(--danger);color:#fff;}
.bin-remove svg{width:10px;height:10px;pointer-events:none;}
.bin-thumb{width:52px;height:32px;border-radius:5px;background-size:cover;background-position:center;
  background-color:#111;flex:none;position:relative;overflow:hidden;}
.bin-swatch{position:absolute;left:0;top:0;bottom:0;width:4px;}
.bin-meta{min-width:0;flex:1;}
.bin-name{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bin-dur{font-size:10.5px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.bin-empty{padding:20px 12px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6;}

.program-monitor{flex:1;display:flex;flex-direction:column;min-width:0;background:#0c0d10;}
.screen{flex:1;position:relative;background:#000;margin:14px 14px 8px 14px;border-radius:8px;
  overflow:hidden;box-shadow:0 0 0 1px var(--border);display:flex;align-items:center;justify-content:center;}
.screen video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;z-index:1;
  transition:none;background:#000;}
.screen video.active{}
#screenCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:2;pointer-events:none;}
.placeholder{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;color:var(--muted);font-size:13px;text-align:center;pointer-events:none;}
.placeholder svg{width:44px;height:44px;opacity:.5;margin-bottom:4px;}
.placeholder-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.3px;}
.placeholder-desc{font-size:12px;color:var(--muted);max-width:260px;line-height:1.5;}
.transport{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 14px 14px 14px;}
.transport-btn{width:34px;height:34px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);}
.transport-btn:hover{background:#2a2d38;}
.transport-btn svg{width:15px;height:15px;}
#btnPlay{width:40px;height:40px;background:var(--accent);border-color:var(--accent);}
#btnPlay:hover{background:#6c4ce8;}
.timecode{font-family:var(--mono);font-size:12.5px;color:var(--text);margin-left:8px;
  background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;letter-spacing:.5px;}
.timecode .sep{color:var(--muted);margin:0 4px;}

/* ---------- timeline panel ---------- */
.timeline-panel{min-height:180px;height:230px;background:var(--panel);display:flex;flex-direction:column;}
.tl-toolbar{height:44px;min-height:44px;display:flex;align-items:center;gap:6px;padding:0 10px;
  border-bottom:1px solid var(--border);overflow-x:auto;overflow-y:hidden;white-space:nowrap;}
.tl-toolbar::-webkit-scrollbar{height:5px;}
.tl-toolbar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.tbtn{width:30px;height:30px;border-radius:6px;background:transparent;border:1px solid transparent;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);flex:none;}
.tbtn:hover{background:var(--panel2);border-color:var(--border);}
.tbtn svg{width:15px;height:15px;}
.ebtn{height:30px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--text);
  flex:none;padding:0 10px;font-size:12px;white-space:nowrap;}
.ebtn:hover{background:#2a2d38;border-color:#3a3f4e;}
.ebtn svg{width:14px;height:14px;flex:none;}
.ebtn span{white-space:nowrap;}
.ebtn-text{height:30px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);
  flex:none;padding:0 12px;font-size:12px;white-space:nowrap;font-family:inherit;}
.ebtn-text:hover{background:#2a2d38;border-color:#3a3f4e;}
.ebtn-text:active{transform:translateY(1px);}
.vol-input{width:52px;height:26px;background:var(--panel2);border:1px solid var(--border);color:var(--text);
  border-radius:6px;font-family:var(--mono);font-size:12px;text-align:center;padding:0 2px;}
.vol-input:focus{outline:none;border-color:var(--accent);}
.vol-input::-webkit-inner-spin-button,.vol-input::-webkit-outer-spin-button{opacity:0.6;}
.tdiv{width:1px;height:22px;background:var(--border);margin:0 6px;flex:none;}
.tgroup{display:flex;align-items:center;gap:6px;flex:none;}
.tsel{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:6px;
  padding:5px 6px;font-size:12px;height:30px;}
.tlabel{font-size:11.5px;color:var(--muted);white-space:nowrap;}
.tl-toolbar-spacer{flex:1;}
.vol-slider,.zoom-slider{width:100px;accent-color:var(--accent);}
.vol-pct,.clip-count{font-family:var(--mono);font-size:11.5px;color:var(--muted);min-width:40px;text-align:right;}

.tl-scroll{flex:1;overflow:auto;position:relative;background:#181a22;}
.tl-scroll::-webkit-scrollbar{height:10px;width:10px;}
.tl-scroll::-webkit-scrollbar-thumb{background:#333747;border-radius:5px;}
.tl-scroll::-webkit-scrollbar-track{background:#14151a;}
.tl-content{position:relative;}
.tl-ruler-row,.tl-track-row{display:flex;}
.tl-label{position:sticky;left:0;z-index:5;width:42px;min-width:42px;background:#1f2129;
  border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--muted);font-weight:600;}
.tl-ruler{height:26px;position:relative;background:#1a1c24;border-bottom:1px solid var(--border);}
.tick{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;align-items:flex-start;}
.tick-line{width:1px;height:7px;background:#454b5c;display:block;}
.tick-label{font-size:9.5px;color:var(--muted);margin-left:3px;font-family:var(--mono);white-space:nowrap;
  transform:translateY(-2px);}
.tl-track{height:88px;position:relative;background:#181a22;}
.grid-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.055);z-index:0;pointer-events:none;}
.grid-line.major{background:rgba(255,255,255,0.1);}
.track-empty{position:absolute;left:42px;right:0;top:26px;height:88px;display:flex;
  align-items:center;justify-content:center;color:var(--muted);font-size:12.5px;text-align:center;
  pointer-events:none;z-index:4;padding:0 20px;line-height:1.5;}
.track-empty.hidden{display:none;}
.clip{position:absolute;top:8px;height:72px;border-radius:6px;overflow:hidden;cursor:grab;
  display:flex;align-items:center;gap:6px;padding:0 6px;border:2px solid transparent;
  box-shadow:0 1px 3px rgba(0,0,0,.4);}
.clip.selected{border-color:var(--amber);}
.clip.dragging{opacity:.85;cursor:grabbing;z-index:20;box-shadow:0 6px 16px rgba(0,0,0,.5);}
.clip-thumb{width:34px;height:34px;border-radius:4px;background-size:cover;background-position:center;
  background-color:rgba(0,0,0,.3);flex:none;pointer-events:none;}
.clip-info{min-width:0;flex:1;pointer-events:none;}
.clip-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);}
.clip-dur{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.75);margin-top:2px;}
.fade{position:absolute;top:0;bottom:0;pointer-events:none;z-index:2;}
.fade-in{left:0;background:linear-gradient(to right, rgba(0,0,0,.8), rgba(0,0,0,0));}
.fade-out{right:0;background:linear-gradient(to left, rgba(0,0,0,.8), rgba(0,0,0,0));}
.clip-vol-badge{position:absolute;bottom:3px;right:5px;font-size:9.5px;font-family:var(--mono);
  background:rgba(0,0,0,.55);border-radius:4px;padding:1px 5px;display:flex;align-items:center;gap:3px;
  color:#fff;z-index:3;pointer-events:none;}
.clip-vol-badge svg{width:9px;height:9px;}
.insert-marker{position:absolute;top:0;bottom:0;width:2px;background:var(--accent2);z-index:15;
  box-shadow:0 0 6px var(--accent2);pointer-events:none;}
.insert-marker.hidden{display:none;}
.playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--amber);z-index:30;pointer-events:auto;
  cursor:ew-resize;}
.playhead::before{content:'';position:absolute;top:0;left:-6px;width:14px;height:10px;
  background:var(--amber);clip-path:polygon(0 0,100% 0,50% 100%);}

/* ---------- overlays ---------- */
.drop-overlay{position:fixed;inset:0;background:rgba(20,21,26,.88);z-index:200;display:flex;
  align-items:center;justify-content:center;font-size:22px;font-weight:600;color:var(--accent2);
  border:3px dashed var(--accent2);margin:14px;border-radius:14px;pointer-events:none;}
.drop-overlay.hidden{display:none;}

.toast-container{position:fixed;right:16px;bottom:16px;display:flex;flex-direction:column;gap:8px;z-index:300;}
.toast{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:8px;padding:10px 14px;font-size:12.5px;box-shadow:0 6px 20px rgba(0,0,0,.4);
  opacity:0;transform:translateY(8px);transition:opacity .25s,transform .25s;max-width:320px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast-warn{border-left-color:var(--amber);}
.toast-error{border-left-color:var(--danger);}

.export-overlay{position:fixed;inset:0;background:rgba(10,11,14,.92);z-index:400;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.export-overlay.hidden{display:none;}
.export-box{width:360px;display:flex;flex-direction:column;gap:14px;align-items:center;}
.export-label{font-size:13.5px;color:var(--text);}
.export-bar-track{width:100%;height:8px;background:var(--panel2);border-radius:5px;overflow:hidden;
  border:1px solid var(--border);}
.export-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .15s;}
.export-pct{font-family:var(--mono);font-size:12px;color:var(--muted);}
.export-note{font-size:11.5px;color:var(--muted);text-align:center;max-width:320px;line-height:1.6;
  background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;}
.export-note b{color:var(--accent2);font-weight:600;}

.hidden{display:none !important;}
</style>
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="brand">
      <div class="brand-icon"></div>
      <div class="brand-text"><span class="brand-main">K-VIDEO EDITOR</span></div>
    </div>
    <div class="topbar-actions">
      <button class="btn" id="btnImport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a1 1 0 001 1h14a1 1 0 001-1v-3"/></svg>
        동영상 가져오기
      </button>
      <button class="btn btn-accent" id="btnExport">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v12M12 16l-4-4M12 16l4-4"/><path d="M4 20h16"/></svg>
        내보내기
      </button>
    </div>
  </header>

  <input type="file" id="fileInput" accept="video/*" multiple class="hidden">

  <main class="stage-wrap">
    <div class="media-bin">
      <div class="bin-header">미디어</div>
      <div class="bin-list" id="binList">
        <div class="bin-empty" id="binEmpty">동영상을 가져오면<br>여기에 표시됩니다.</div>
      </div>
    </div>
    <div class="program-monitor">
      <div class="screen" id="screen">
        <canvas id="screenCanvas"></canvas>
        <div class="placeholder" id="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="15" height="14" rx="2"/><path d="M17 9l5-3v12l-5-3"/></svg>
          <div class="placeholder-title">프로그램 모니터</div>
          <div class="placeholder-desc">타임라인의 클립을 재생하거나 스크럽하면<br>편집 중인 화면이 여기에 표시됩니다.</div>
        </div>
      </div>
      <div class="transport">
        <div class="transport-btn" id="btnToStart" title="처음으로">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h2v14H6zM20 5v14l-11-7z" transform="scale(-1,1) translate(-24,0)"/></svg>
        </div>
        <div class="transport-btn" id="btnPlay" title="재생/일시정지">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <div class="transport-btn" id="btnToEnd" title="끝으로">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h2v14H6zM20 5v14l-11-7z"/></svg>
        </div>
        <div class="timecode" id="timecode">00:00.00<span class="sep">/</span>00:00.00</div>
      </div>
    </div>
  </main>

  <section class="timeline-panel">
    <div class="tl-toolbar">
      <div class="tgroup">
        <div class="ebtn" id="btnCut" title="자르기 (재생헤드 이후 삭제)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M8.5 8L19 19M19 5L8.5 16"/></svg>
          <span>자르기</span>
        </div>
        <div class="ebtn" id="btnSplit" title="분할 (S)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3l6 8 6-8M6 21l6-8 6 8"/></svg>
          <span>분할</span>
        </div>
        <div class="ebtn" id="btnDuplicate" title="복제 (D)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="8" width="12" height="12" rx="1.5"/><path d="M4 16V5a1 1 0 011-1h11"/></svg>
          <span>복제</span>
        </div>
        <div class="ebtn" id="btnDelete" title="삭제 (Delete)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>
          <span>삭제</span>
        </div>
        <div class="ebtn" id="btnUndo" title="되돌리기 (Ctrl+Z)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10h10a5 5 0 010 10H10"/><path d="M4 10l5-5M4 10l5 5"/></svg>
          <span>되돌리기</span>
        </div>
      </div>
      <div class="tdiv"></div>
      <div class="tgroup">
        <select class="tsel" id="fadeLenSelect">
          <option value="0.5">0.5초</option>
          <option value="1" selected>1초</option>
          <option value="1.5">1.5초</option>
          <option value="2">2초</option>
          <option value="2.5">2.5초</option>
          <option value="3">3초</option>
          <option value="3.5">3.5초</option>
          <option value="4">4초</option>
        </select>
        <button class="ebtn-text" id="btnFadeIn" title="페이드 인">페이드 인</button>
        <button class="ebtn-text" id="btnFadeOut" title="페이드 아웃">페이드 아웃</button>
        <button class="ebtn-text" id="btnFadeClear" title="페이드 제거">페이드 제거</button>
      </div>
      <div class="tdiv"></div>
      <div class="tgroup">
        <span class="tlabel">클립별 볼륨조절</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px;color:var(--muted);"><path d="M4 9v6h4l5 5V4L8 9H4z"/><path d="M17 8a5 5 0 010 8"/></svg>
        <input type="range" class="vol-slider" id="volSlider" min="-100" max="100" step="5" value="0">
        <input type="number" class="vol-input" id="volInput" min="-100" max="100" step="1" value="0">
        <span class="vol-pct">%</span>
      </div>
      <div class="tl-toolbar-spacer"></div>
      <span class="clip-count" id="clipCount">0개 클립</span>
      <div class="tgroup">
        <span class="tlabel">줌</span>
        <input type="range" class="zoom-slider" id="zoomSlider" min="0.2" max="30" step="any" value="1">
      </div>
    </div>

    <div class="tl-scroll" id="tlScroll">
      <div class="tl-content" id="tlContent">
        <div class="tl-ruler-row">
          <div class="tl-label"></div>
          <div class="tl-ruler" id="ruler"></div>
        </div>
        <div class="tl-track-row">
          <div class="tl-label">V1</div>
          <div class="tl-track" id="track"></div>
        </div>
        <div class="insert-marker hidden" id="insertMarker"></div>
        <div class="playhead" id="playheadLine"></div>
        <div class="track-empty hidden" id="trackEmpty">동영상을 가져오면 여기에 클립이 표시됩니다.</div>
      </div>
    </div>
  </section>

</div>

<div class="drop-overlay hidden" id="dropOverlay">여기에 동영상을 놓으세요</div>

<div class="toast-container" id="toastContainer"></div>

<div class="export-overlay hidden" id="exportOverlay">
  <div class="export-box">
    <div class="export-label" id="exportProgressLabel">준비 중...</div>

function clipDur(c){ return Math.max(0, c.out - c.in); }

  let s = 0;
  for(let i=0;i<state.clips.length;i++){

    if(t < s + d - 1e-9 || i === state.clips.length-1){

/* =========================================================

/* =========================================================

function toast(msg, type){

/* =========================================================

fileInput.addEventListener('change', (e)=>{

});

async function handleFiles(fileList){
  const all = Array.from(fileList || []);

  const rejected = all.length - files.length;
  if(rejected>0) toast(rejected+'개 파일은 동영상이 아니라 무시했습니다.', 'warn');

function importFile(file){

function addBinItem(src){

/* =========================================================

   ========================================================= */
let activeEl = null;

function setActiveSource(id, initialOpacity){
  const opacityStr = (initialOpacity==null) ? '0' : String(initialOpacity);
  if(state.activeSourceId === id){

    if(activeEl && initialOpacity!=null) activeEl.style.opacity = opacityStr;

function seekSource(sourceId, time, cb, initialOpacity){

  const scale = Math.min(cw/vw, ch/vh) || 1;
  const dw = vw*scale, dh = vh*scale;
  const dx = (cw-dw)/2, dy = (ch-dh)/2;
  try{ ctx2d.drawImage(v, dx, dy, dw, dh); }catch(e){}
  const loc = locate(state.playhead);
  if(loc){
    const c = state.clips[loc.index];
    const f = clipFadeFactor(c, loc.offset);
    if(f<0.999){
      ctx2d.fillStyle = 'rgba(0,0,0,'+(1-f)+')';
      ctx2d.fillRect(0,0,cw,ch);
    }

function paint(){
  if(!activeEl){ ctx2d.clearRect(0,0,canvas.width,canvas.height); return; }
  if(state.isPlaying){ ctx2d.clearRect(0,0,canvas.width,canvas.height); return; }

function paintWhenReady(v){

  const loc = locate(t);

  const c = state.clips[loc.index];
  const f = clipFadeFactor(c, loc.offset);
  seekSource(c.sourceId, c.in + loc.offset, null, f);

  canvas.width = Math.max(1, Math.round(rect.width));
  canvas.height = Math.max(1, Math.round(rect.height));

}

/* =========================================================

   ========================================================= */
function ensureAudioGraph(){
  if(!state.audio.ctx){
    const AC = window.AudioContext || window.webkitAudioContext;
    state.audio.ctx = new AC();
    state.audio.gain = state.audio.ctx.createGain();
    state.audio.gain.gain.value = 1;
    state.audio.dest = state.audio.ctx.createMediaStreamDestination();
    state.audio.gain.connect(state.audio.ctx.destination);
    state.audio.gain.connect(state.audio.dest);

  Object.values(state.sources).forEach(function(src){
    if(!src.el._wired){

        const node = state.audio.ctx.createMediaElementSource(src.el);
        node.connect(state.audio.gain);
      }catch(e){ /* ignore */ }

    if(activeEl) activeEl.volume = 1;
  } else if(activeEl){
    activeEl.volume = Math.max(0, Math.min(1, level));
  }

   ========================================================= */
function updatePlayIcon(){
  if(state.isPlaying){
    playIcon.innerHTML = '<path d="M7 5h4v14H7zM13 5h4v14h-4z"/>';
  } else {
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }

function play(){

  if(state.playhead >= totalDuration()-0.001) state.playhead = 0;
  ensureAudioGraph();
  state.audio.ctx.resume();
  const loc = locate(state.playhead);
  if(!loc) return;
  const c = state.clips[loc.index];
  state.activeIdx = loc.index;
  const srcTime = c.in + loc.offset;
  const f0 = clipFadeFactor(c, loc.offset);
  seekSource(c.sourceId, srcTime, function(){
    const f = clipFadeFactor(c, loc.offset);
    if(activeEl) activeEl.style.opacity = String(f);
    applyAudioLevel(f * ((c.volume==null?1:c.volume)));
    const p = activeEl ? activeEl.play() : Promise.resolve();
    (p || Promise.resolve()).then(function(){
      state.isPlaying = true;
      updatePlayIcon();
      paint();
      requestAnimationFrame(tick);
    }).catch(function(){ toast('재생을 시작할 수 없습니다.','error'); });
  }, f0);
}

function pause(){
  if(activeEl) activeEl.pause();
  state.isPlaying = false;
  updatePlayIcon();
  const loc = locate(state.playhead);
  if(loc){
    const c = state.clips[loc.index];
    const f = clipFadeFactor(c, loc.offset);
    if(activeEl) activeEl.style.opacity = String(f);
    applyAudioLevel(f*((c.volume==null?1:c.volume)));
  } else {
    applyAudioLevel(1);
  }
  paint();
}

function stopAtEnd(){
  if(activeEl) activeEl.pause();
  state.isPlaying = false;
  updatePlayIcon();
  applyAudioLevel(1);
  paint();
  updatePlayheadUI();
}

function tick(){
  if(!state.isPlaying) return;
  const c = state.clips[state.activeIdx];
  if(!c){ stopAtEnd(); return; }
  const v = activeEl;
  if(!v){ stopAtEnd(); return; }
  const offset = v.currentTime - c.in;

  if(v.currentTime >= c.out - 0.04 || v.ended){
    advanceClip();
    if(state.isPlaying) requestAnimationFrame(tick);
    return;
  }

  state.playhead = clipStart(state.activeIdx) + offset;
  updatePlayheadUI();
  const f = clipFadeFactor(c, offset);
  v.style.opacity = String(f);
  applyAudioLevel(f * ((c.volume==null?1:c.volume)));
  requestAnimationFrame(tick);
}

function advanceClip(){
  const cur = state.clips[state.activeIdx];
  const nextIdx = state.activeIdx + 1;
  if(nextIdx >= state.clips.length){
    state.playhead = totalDuration();
    stopAtEnd();
    return;
  }
  const next = state.clips[nextIdx];
  state.activeIdx = nextIdx;
  state.playhead = clipStart(nextIdx);
  updatePlayheadUI();

  const continuous = next.sourceId === cur.sourceId && Math.abs(next.in - cur.out) < 0.06;
  if(continuous){
    const v = activeEl;
    const f = clipFadeFactor(next, 0);
    if(v) v.style.opacity = String(f);
    applyAudioLevel(f * ((next.volume==null?1:next.volume)));
  } else {
    const f0 = clipFadeFactor(next, 0);
    seekSource(next.sourceId, next.in, function(){
      const f = clipFadeFactor(next, 0);
      if(activeEl) activeEl.style.opacity = String(f);
      applyAudioLevel(f * ((next.volume==null?1:next.volume)));
      if(activeEl) activeEl.play().catch(function(){});
    }, f0);
  }
}

/* =========================================================
   TIMELINE UI
   ========================================================= */
function computeMinPxPerSec(){
  const areaWidth = Math.max(100, tlScroll.clientWidth - LABEL_WIDTH);
  return Math.min(30, Math.max(0.2, areaWidth/600));
}
function recomputeZoomBounds(){
  const min = computeMinPxPerSec();
  state.minPxPerSec = min;
  zoomSlider.min = String(min);
  zoomSlider.max = '30';
  if(state.pxPerSec < min) state.pxPerSec = min;
  zoomSlider.value = String(state.pxPerSec);
}
function pickTickStep(pxPerSec){
  const candidates = [1,2,5,10,20,30,60];
  for(const s of candidates){ if(s*pxPerSec >= 55) return s; }
  return 60;
}

function updatePlayheadUI(){
  timecodeEl.innerHTML = fmtTime(state.playhead) + '<span class="sep">/</span>' + fmtTime(totalDuration());
  const x = LABEL_WIDTH + state.playhead*state.pxPerSec;
  playheadLine.style.left = x + 'px';
  const scrollLeft = tlScroll.scrollLeft;
  const viewW = tlScroll.clientWidth;
  if(x < scrollLeft + LABEL_WIDTH + 10) tlScroll.scrollLeft = Math.max(0, x - LABEL_WIDTH - 10);
  else if(x > scrollLeft + viewW - 10) tlScroll.scrollLeft = x - viewW + 10;
}

function renderTimeline(){
  recomputeZoomBounds();
  const dur = totalDuration();
  const areaWidth = Math.max(100, tlScroll.clientWidth - LABEL_WIDTH);
  const contentWidth = Math.max(dur*state.pxPerSec, areaWidth);
  tlContent.style.width = (LABEL_WIDTH + contentWidth) + 'px';
  ruler.style.width = contentWidth + 'px';
  track.style.width = contentWidth + 'px';

  ruler.innerHTML = '';
  const step = pickTickStep(state.pxPerSec);
  const rulerDur = Math.max(dur, contentWidth/state.pxPerSec);
  for(let t=0; t<=rulerDur+0.0001; t+=step){
    const tickEl = document.createElement('div');
    tickEl.className = 'tick';
    tickEl.style.left = (t*state.pxPerSec) + 'px';
    tickEl.innerHTML = '<span class="tick-line"></span><span class="tick-label">'+fmtTickLabel(t,step)+'</span>';
    ruler.appendChild(tickEl);
  }

  track.innerHTML = '';
  for(let t=0; t<=rulerDur+0.0001; t+=step){
    const gl = document.createElement('div');
    const majorEvery = step*5;
    const isMajor = Math.abs((t/majorEvery) - Math.round(t/majorEvery)) < 0.001;
    gl.className = 'grid-line' + (isMajor ? ' major' : '');
    gl.style.left = (t*state.pxPerSec) + 'px';
    track.appendChild(gl);
  }
  let x = 0;
  state.clips.forEach(function(c, i){
    const src = state.sources[c.sourceId];
    const w = clipDur(c) * state.pxPerSec;
    const el = document.createElement('div');
    el.className = 'clip' + (c.id===state.selectedId ? ' selected':'');
    el.style.left = x + 'px';
    el.style.width = Math.max(3, w) + 'px';
    el.style.background = src ? hexToRgba(src.color,0.35) : '#333';
    el.style.borderLeft = '3px solid ' + (src ? src.color : '#666');
    el.dataset.id = c.id;

    let html = '<div class="clip-thumb" style="background-image:url(\''+(src?src.thumb:'')+'\')"></div>'+
      '<div class="clip-info"><div class="clip-name">'+escapeHtml(src?src.name:'?')+'</div>'+
      '<div class="clip-dur">'+fmtTime(clipDur(c))+'</div></div>';
    if(c.fadeIn>0) html += '<div class="fade fade-in" style="width:'+(c.fadeIn*state.pxPerSec)+'px"></div>';
    if(c.fadeOut>0) html += '<div class="fade fade-out" style="width:'+(c.fadeOut*state.pxPerSec)+'px"></div>';
    const vol = c.volume==null?1:c.volume;
    if(Math.abs(vol-1)>0.001){
      const pct = volumeToPct(vol);
      html += '<div class="clip-vol-badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 9v6h4l5 5V4L8 9H4z"/></svg>'+(pct>0?'+':'')+pct+'%</div>';
    }
    el.innerHTML = html;

    el.addEventListener('click', function(e){ e.stopPropagation(); selectClip(c.id); });
    attachClipDrag(el, c, i);
    track.appendChild(el);
    x += w;
  });

  clipCountEl.textContent = state.clips.length + '개 클립';
  playheadLine.style.left = (LABEL_WIDTH + state.playhead*state.pxPerSec) + 'px';
  updateVolumeUI();
}
function hexToRgba(hex, a){
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function selectClip(id){
  state.selectedId = id;
  renderTimeline();
}

/* ---- scrubbing on ruler / empty track ---- */
function xToTime(clientX){
  const rect = track.getBoundingClientRect();
  const x = clientX - rect.left;
  return Math.max(0, Math.min(totalDuration(), x/state.pxPerSec));
}
function scrubTo(clientX){
  const t = xToTime(clientX);
  state.playhead = t;
  if(state.isPlaying) pause();
  seekPreview(t);
  updatePlayheadUI();
}
[ruler, track].forEach(function(elm){
  elm.addEventListener('mousedown', function(e){
    if(e.target.closest('.clip')) return;
    if(e.target === playheadLine) return;
    scrubTo(e.clientX);
    function move(ev){ scrubTo(ev.clientX); }
    function up(){ window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); }
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  });
});
playheadLine.addEventListener('mousedown', function(e){
  e.stopPropagation();
  function move(ev){ scrubTo(ev.clientX); }
  function up(){ window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); }
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup', up);
});

/* ---- clip drag reorder ---- */
function computeInsertIndex(clientX){
  const rect = track.getBoundingClientRect();
  const x = clientX - rect.left;
  let acc = 0;
  for(let k=0;k<state.clips.length;k++){
    const w = clipDur(state.clips[k]) * state.pxPerSec;
    if(x < acc + w/2) return k;
    acc += w;
  }
  return state.clips.length;
}
function positionInsertMarker(idx){
  let x = 0;
  for(let k=0;k<idx;k++) x += clipDur(state.clips[k]) * state.pxPerSec;
  insertMarker.style.left = (LABEL_WIDTH + x) + 'px';
  insertMarker.classList.remove('hidden');
}
function hideInsertMarker(){ insertMarker.classList.add('hidden'); }

function attachClipDrag(el, c){
  el.addEventListener('mousedown', function(e){
    if(e.button !== 0) return;
    e.stopPropagation();
    const startX = e.clientX;
    let moved = false;
    let liveEl = el;
    let insertIndex = state.clips.findIndex(function(cc){ return cc.id===c.id; });
    selectClip(c.id);

    function onMove(ev){
      const dx = ev.clientX - startX;
      if(!moved && Math.abs(dx) < 4) return;
      if(!moved){
        moved = true;
        renderTimeline();
        liveEl = track.querySelector('.clip[data-id="'+c.id+'"]');
        if(liveEl) liveEl.classList.add('dragging');
      }
      if(liveEl) liveEl.style.transform = 'translateX('+dx+'px)';
      insertIndex = computeInsertIndex(ev.clientX);
      positionInsertMarker(insertIndex);
    }
    function onUp(){
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      if(moved){
        if(liveEl){ liveEl.classList.remove('dragging'); liveEl.style.transform=''; }
        hideInsertMarker();
        moveClip(c.id, insertIndex);
      }
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });
}
function moveClip(id, insertIndex){
  const from = state.clips.findIndex(function(c){ return c.id===id; });
  if(from<0) return;
  let idx = insertIndex;
  if(from < idx) idx -= 1;
  idx = Math.max(0, Math.min(state.clips.length-1, idx));
  if(idx === from) return;
  pushHistory();
  const item = state.clips.splice(from,1)[0];
  state.clips.splice(idx,0,item);
  afterChange();
}

/* =========================================================
   EDIT OPERATIONS
   ========================================================= */
function currentClipIdAtPlayhead(){
  const loc = locate(state.playhead);
  return loc ? state.clips[loc.index].id : null;
}
function targetClip(){
  const id = state.selectedId || currentClipIdAtPlayhead();
  return state.clips.find(function(c){ return c.id===id; }) || null;
}

function splitAtPlayhead(){
  const loc = locate(state.playhead);
  if(!loc){ toast('분할할 클립이 없습니다.','warn'); return; }
  const c = state.clips[loc.index];
  const dur = clipDur(c);
  const EPS = 0.08;
  if(loc.offset < EPS || loc.offset > dur - EPS){
    toast('클립 경계에 너무 가깝습니다.','warn');
    return;
  }
  pushHistory();
  const splitSrc = c.in + loc.offset;
  const left = Object.assign({}, c, { id: uid('clip'), out: splitSrc, fadeOut: 0 });
  const right = Object.assign({}, c, { id: uid('clip'), in: splitSrc, fadeIn: 0 });
  state.clips.splice(loc.index, 1, left, right);
  state.selectedId = right.id;
  afterChange();
  toast('클립을 분할했습니다.','info');
}

function cutAtPlayhead(){
  const loc = locate(state.playhead);
  if(!loc){ toast('자를 클립이 없습니다.','warn'); return; }
  const c = state.clips[loc.index];
  const dur = clipDur(c);
  const EPS = 0.08;
  if(loc.offset < EPS){
    toast('클립 시작 지점에서는 자를 수 없습니다.','warn');
    return;
  }
  if(loc.offset > dur - EPS){
    toast('클립 끝 지점입니다. 자를 내용이 없습니다.','warn');
    return;
  }
  pushHistory();
  const wasPlaying = state.isPlaying;
  if(wasPlaying) pause();
  const newOut = c.in + loc.offset;
  c.out = newOut;
  const newDur = clipDur(c);
  c.fadeOut = Math.min(c.fadeOut||0, newDur);
  c.fadeIn = Math.min(c.fadeIn||0, newDur - c.fadeOut);
  state.selectedId = c.id;
  afterChange();
  toast('자르는 지점 이후를 삭제했습니다.','info');
}

function deleteSelected(){
  const id = state.selectedId || currentClipIdAtPlayhead();
  const idx = state.clips.findIndex(function(c){ return c.id===id; });
  if(idx<0){ toast('삭제할 클립을 선택하세요.','warn'); return; }
  pushHistory();
  state.clips.splice(idx,1);
  state.selectedId = null;
  afterChange();
}

function duplicateSelected(){
  const id = state.selectedId || currentClipIdAtPlayhead();
  const idx = state.clips.findIndex(function(c){ return c.id===id; });
  if(idx<0){ toast('복제할 클립을 선택하세요.','warn'); return; }
  pushHistory();
  const copy = Object.assign({}, state.clips[idx], { id: uid('clip') });
  state.clips.splice(idx+1,0,copy);
  state.selectedId = copy.id;
  afterChange();
}

function applyFadeIn(){
  const c = targetClip();
  if(!c){ toast('대상 클립이 없습니다.','warn'); return; }
  pushHistory();
  const len = parseFloat(fadeLenSelect.value);
  const dur = clipDur(c);
  c.fadeIn = Math.max(0, Math.min(len, dur - (c.fadeOut||0)));
  afterChange();
}
function applyFadeOut(){
  const c = targetClip();
  if(!c){ toast('대상 클립이 없습니다.','warn'); return; }
  pushHistory();
  const len = parseFloat(fadeLenSelect.value);
  const dur = clipDur(c);
  c.fadeOut = Math.max(0, Math.min(len, dur - (c.fadeIn||0)));
  afterChange();
}
function clearFade(){
  const c = targetClip();
  if(!c){ toast('대상 클립이 없습니다.','warn'); return; }
  pushHistory();
  c.fadeIn = 0; c.fadeOut = 0;
  afterChange();
}

let volDragActive = false;
let volInputEditing = false;

function applyVolumeLive(c, pct){
  c.volume = pctToVolume(pct);
  renderTimeline();
  if(!state.isPlaying){
    const loc = locate(state.playhead);
    if(loc && state.clips[loc.index].id === c.id){
      applyAudioLevel(clipFadeFactor(c, loc.offset) * c.volume);
    }
  }
}

volSlider.addEventListener('mousedown', function(){ volDragActive = false; });
volSlider.addEventListener('input', function(){
  const c = targetClip();
  const pct = parseFloat(volSlider.value);
  volInput.value = String(pct);
  if(!c) return;
  if(!volDragActive){ pushHistory(); volDragActive = true; }
  applyVolumeLive(c, pct);
});
volSlider.addEventListener('change', function(){ volDragActive = false; });

volInput.addEventListener('input', function(){
  let val = parseFloat(volInput.value);
  if(isNaN(val)) return;
  val = Math.max(-100, Math.min(100, Math.round(val)));
  const c = targetClip();
  if(!c) return;
  if(!volInputEditing){ pushHistory(); volInputEditing = true; }
  volSlider.value = String(val);
  applyVolumeLive(c, val);
});
volInput.addEventListener('blur', function(){
  volInputEditing = false;
  updateVolumeUI();
});
volInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ e.preventDefault(); volInput.blur(); }
});

function updateVolumeUI(){
  const c = targetClip();
  if(c){
    const pct = volumeToPct(c.volume);
    volSlider.value = String(pct);
    if(document.activeElement !== volInput) volInput.value = String(pct);
  } else {
    volSlider.value = '0';
    if(document.activeElement !== volInput) volInput.value = '0';
  }
}

/* =========================================================
   AFTER-CHANGE / PLACEHOLDER
   ========================================================= */
function updatePlaceholder(){
  const empty = state.clips.length===0;
  placeholder.style.display = empty ? 'flex' : 'none';
  trackEmpty.classList.toggle('hidden', !empty);
  if(empty) activeSourceNone();
}
let prevClipCount = 0;
function fitZoomToContent(){
  const dur = totalDuration();
  if(dur <= 0) return;
  const areaWidth = Math.max(100, tlScroll.clientWidth - LABEL_WIDTH);
  /* ⚠ The zoom slider's minimum is calibrated so 600s (10 min) fits the
     screen — but real footage is almost always far shorter than that.
     Starting at that minimum turns short clips into an unclickable sliver
     a few pixels wide, so any click/scrub lands past the end and always
     shows the last frame. Instead, fit the ACTUAL content to the visible
     width (with a little padding) the first time clips appear. */
  let px = areaWidth / (dur * 1.15);
  px = Math.max(state.minPxPerSec, Math.min(30, px));
  state.pxPerSec = px;
}
function afterChange(){
  const dur = totalDuration();
  if(state.playhead > dur) state.playhead = dur;
  if(prevClipCount === 0 && state.clips.length > 0){
    fitZoomToContent();
  }
  prevClipCount = state.clips.length;
  renderTimeline();
  updatePlaceholder();
  if(!state.isPlaying) seekPreview(state.playhead);
  updatePlayheadUI();
}

/* =========================================================
   TRANSPORT / TOOLBAR WIRING

$('btnPlay').addEventListener('click', function(){ state.isPlaying ? pause() : play(); });
$('btnToStart').addEventListener('click', function(){ pause(); state.playhead=0; seekPreview(0); updatePlayheadUI(); });
$('btnToEnd').addEventListener('click', function(){ pause(); state.playhead=totalDuration(); seekPreview(state.playhead); updatePlayheadUI(); });
$('btnCut').addEventListener('click', cutAtPlayhead);
$('btnSplit').addEventListener('click', splitAtPlayhead);
$('btnDuplicate').addEventListener('click', duplicateSelected);

$('btnUndo').addEventListener('click', undo);

zoomSlider.addEventListener('input', function(){
  state.pxPerSec = parseFloat(zoomSlider.value);
  renderTimeline();
});
window.addEventListener('resize', function(){
  resizeCanvas();
  renderTimeline();
});

function stepFrame(dir){
  pause();
  state.playhead = Math.max(0, Math.min(totalDuration(), state.playhead + dir/FPS));
  seekPreview(state.playhead);
  updatePlayheadUI();
}
window.addEventListener('keydown', function(e){
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if(['INPUT','TEXTAREA','SELECT'].indexOf(tag) !== -1) return;
  switch(e.key){
    case ' ': e.preventDefault(); state.isPlaying ? pause() : play(); break;
    case 's': case 'S': case 'c': case 'C': splitAtPlayhead(); break;
    case 'Delete': case 'Backspace': deleteSelected(); break;
    case 'd': case 'D': duplicateSelected(); break;
    case 'Home': pause(); state.playhead=0; seekPreview(0); updatePlayheadUI(); break;
    case 'End': pause(); state.playhead=totalDuration(); seekPreview(state.playhead); updatePlayheadUI(); break;
    case 'ArrowLeft': stepFrame(-1); break;
    case 'ArrowRight': stepFrame(1); break;
    case 'z': case 'Z': if(e.ctrlKey || e.metaKey){ e.preventDefault(); undo(); } break;
  }
});

/* =========================================================
   EXPORT
   ========================================================= */
$('btnExport').addEventListener('click', startExport);

function showExportOverlay(show, label, pct){
  exportOverlay.classList.toggle('hidden', !show);
  if(label !== undefined) exportProgressLabel.textContent = label;
  if(pct !== undefined){
    exportProgressBar.style.width = pct + '%';
    exportProgressPct.textContent = Math.round(pct) + '%';
  }
}
function updateExportNote(filename){
  if(filename){
    exportNote.innerHTML = '완료되면 브라우저의 <b>기본 다운로드 폴더</b>에 <b>' + escapeHtml(filename) + '</b> 파일로 자동 저장됩니다.';
  } else {
    exportNote.innerHTML = '완료되면 브라우저의 <b>기본 다운로드 폴더</b>에 파일이 자동으로 저장됩니다.';
  }
}

async function startExport(){
  if(state.clips.length===0){ toast('내보낼 클립이 없습니다.','warn'); return; }
  if(state.isPlaying) pause();
  updateExportNote(null);
  showExportOverlay(true, '준비 중...', 0);
  let savedFilename = null;
  try{
    if(supportsWebCodecs()){
      savedFilename = await exportPrecise();
    } else {
      toast('이 브라우저는 정밀 인코딩을 지원하지 않아 녹화 방식으로 내보냅니다.','warn');
      savedFilename = await exportRecording();
    }
    toast((savedFilename||'파일')+' 이 다운로드 폴더에 저장되었습니다.', 'info');
  } catch(err){
    console.error(err);
    toast('내보내기 중 오류가 발생했습니다: ' + (err && err.message ? err.message : err), 'error');
  } finally {
    showExportOverlay(false);
    seekPreview(state.playhead);
  }
}
function supportsWebCodecs(){
  return typeof window.VideoEncoder !== 'undefined' &&
         typeof window.AudioEncoder !== 'undefined' &&
         typeof window.VideoFrame !== 'undefined' &&
         !!window.Mp4Muxer;
}

function getUsedSourceIds(){
  const set = {};
  state.clips.forEach(function(c){ set[c.sourceId] = true; });
  return Object.keys(set);
}
function computeResolution(){
  let maxH = 0;
  getUsedSourceIds().forEach(function(id){
    const s = state.sources[id];
    if(s && s.el.videoHeight > maxH) maxH = s.el.videoHeight;
  });
  const use1080 = maxH >= 900;
  return use1080 ? { width:1920, height:1080, bitrate:16000000 } : { width:1280, height:720, bitrate:10000000 };
}

function seekExact(v, t){
  return new Promise(function(resolve){
    const target = Math.min(Math.max(t,0), (v.duration || t) || t);
    let done = false;
    function finish(){ if(done) return; done = true; v.removeEventListener('seeked', onSeeked); resolve(); }
    function onSeeked(){ finish(); }
    v.addEventListener('seeked', onSeeked);
    try{ v.currentTime = target; }
    catch(e){ finish(); }
    setTimeout(finish, 1200);
  });
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(function(){ URL.revokeObjectURL(url); }, 8000);
}

async function exportPrecise(){
  const dur = totalDuration();
  const totalFrames = Math.max(1, Math.round(dur*FPS));
  const { width, height, bitrate } = computeResolution();
  const filename = 'kvideo_export_' + Date.now() + '.mp4';
  updateExportNote(filename);

  const off = document.createElement('canvas');
  off.width = width; off.height = height;
  const octx = off.getContext('2d');

  const codecCandidates = ['avc1.640028','avc1.4D4028','avc1.42E01E'];
  let chosenCodec = null;
  for(const codec of codecCandidates){
    try{
      const support = await VideoEncoder.isConfigSupported({ codec, width, height, bitrate, framerate:FPS });
      if(support && support.supported){ chosenCodec = codec; break; }
    }catch(e){}
  }
  if(!chosenCodec) throw new Error('지원되는 비디오 코덱이 없습니다.');

  const muxer = new Mp4Muxer.Muxer({
    target: new Mp4Muxer.ArrayBufferTarget(),
    video: { codec:'avc', width, height },
    audio: { codec:'aac', numberOfChannels:2, sampleRate:48000 },
    fastStart: 'in-memory'
  });

  const videoEncoder = new VideoEncoder({
    output: function(chunk, meta){ muxer.addVideoChunk(chunk, meta); },
    error: function(e){ throw e; }
  });
  videoEncoder.configure({ codec: chosenCodec, width, height, bitrate, framerate: FPS });

  /* ---- audio render ---- */
  showExportOverlay(true, '오디오 처리 중...', 0);
  const sampleRate = 48000;
  const offlineCtx = new OfflineAudioContext(2, Math.ceil((dur+1)*sampleRate), sampleRate);
  const decodedBuffers = {};
  const usedIds = getUsedSourceIds();
  for(const sid of usedIds){
    const src = state.sources[sid];
    try{
      const resp = await fetch(src.url);
      const arr = await resp.arrayBuffer();
      decodedBuffers[sid] = await offlineCtx.decodeAudioData(arr);
    }catch(e){ decodedBuffers[sid] = null; }
  }
  let cs = 0;
  for(const c of state.clips){
    const buf = decodedBuffers[c.sourceId];
    const cdur = clipDur(c);
    if(buf && cdur>0.001){
      const srcNode = offlineCtx.createBufferSource();
      srcNode.buffer = buf;
      const gainNode = offlineCtx.createGain();
      srcNode.connect(gainNode);
      gainNode.connect(offlineCtx.destination);
      const vol = c.volume==null?1:c.volume;
      const fi = Math.min(c.fadeIn||0, cdur);
      const fo = Math.min(c.fadeOut||0, cdur);
      const t0 = cs;
      try{
        gainNode.gain.setValueAtTime(fi>0?0:vol, t0);
        if(fi>0) gainNode.gain.linearRampToValueAtTime(vol, t0+fi);
        const foStart = Math.max(t0+fi, t0+cdur-fo);
        if(fo>0){
          gainNode.gain.setValueAtTime(vol, foStart);
          gainNode.gain.linearRampToValueAtTime(0, t0+cdur);
        }
        srcNode.start(t0, c.in, cdur);
      }catch(e){}
    }
    cs += cdur;
  }
  const rendered = await offlineCtx.startRendering();

  const audioEncoder = new AudioEncoder({
    output: function(chunk, meta){ muxer.addAudioChunk(chunk, meta); },
    error: function(e){ throw e; }
  });
  audioEncoder.configure({ codec:'mp4a.40.2', sampleRate:48000, numberOfChannels:2, bitrate:192000 });

  const chunkSize = 1024;
  const numFrames = rendered.length;
  const ch0 = rendered.getChannelData(0);
  const ch1 = rendered.numberOfChannels>1 ? rendered.getChannelData(1) : ch0;
  for(let i=0;i<numFrames;i+=chunkSize){
    const len = Math.min(chunkSize, numFrames-i);
    const planar = new Float32Array(len*2);
    planar.set(ch0.subarray(i,i+len), 0);
    planar.set(ch1.subarray(i,i+len), len);
    const audioData = new AudioData({
      format:'f32-planar', sampleRate:48000, numberOfFrames:len, numberOfChannels:2,
      timestamp: Math.round(i/48000*1e6), data: planar
    });
    if(audioEncoder.encodeQueueSize>8) await new Promise(function(r){ setTimeout(r,0); });
    audioEncoder.encode(audioData);
    audioData.close();
  }
  await audioEncoder.flush();

  /* ---- video render ---- */
  showExportOverlay(true, '영상 인코딩 중... 0%', 0);
  const frameDurUs = Math.round(1e6/FPS);
  for(let i=0;i<totalFrames;i++){
    const t = Math.min(i/FPS, Math.max(0,dur-0.0005));
    const loc = locate(t) || { index: state.clips.length-1, offset: 0 };
    const c = state.clips[loc.index];
    const src = state.sources[c.sourceId];
    if(src){
      const srcTime = c.in + loc.offset;
      await seekExact(src.el, srcTime);
      octx.fillStyle = '#000'; octx.fillRect(0,0,width,height);
      const vw = src.el.videoWidth||width, vh = src.el.videoHeight||height;
      const scale = Math.min(width/vw, height/vh) || 1;
      const dw = vw*scale, dh = vh*scale;
      try{ octx.drawImage(src.el, (width-dw)/2, (height-dh)/2, dw, dh); }catch(e){}
      const f = clipFadeFactor(c, loc.offset);
      if(f<0.999){ octx.fillStyle = 'rgba(0,0,0,'+(1-f)+')'; octx.fillRect(0,0,width,height); }
    } else {
      octx.fillStyle = '#000'; octx.fillRect(0,0,width,height);
    }
    const frame = new VideoFrame(off, { timestamp: i*frameDurUs, duration: frameDurUs });
    const keyFrame = (i % (FPS*2)) === 0;
    if(videoEncoder.encodeQueueSize>4) await new Promise(function(r){ setTimeout(r,0); });
    videoEncoder.encode(frame, { keyFrame });
    frame.close();
    if(i % 5 === 0){
      const pct = Math.round(i/totalFrames*100);
      showExportOverlay(true, '영상 인코딩 중... ' + pct + '%', pct);
    }
  }
  await videoEncoder.flush();
  showExportOverlay(true, '마무리 중...', 100);
  muxer.finalize();
  const buffer = muxer.target.buffer;
  const blob = new Blob([buffer], { type:'video/mp4' });
  downloadBlob(blob, filename);
  return filename;
}

async function exportRecording(){
  const dur = totalDuration();
  const { width, height } = computeResolution();
  const off = document.createElement('canvas');
  off.width = width; off.height = height;
  const octx = off.getContext('2d');

  ensureAudioGraph();
  const stream = off.captureStream ? off.captureStream(0) : off.captureStream();
  const audioTrack = state.audio.dest.stream.getAudioTracks()[0];
  if(audioTrack) stream.addTrack(audioTrack);

  const mimeCandidates = [
    'video/mp4;codecs=avc1.640028,mp4a.40.2',
    'video/mp4;codecs=h264,aac',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm'
  ];
  let mime = null;
  for(const m of mimeCandidates){
    if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(m)){ mime = m; break; }
  }
  if(!mime) throw new Error('지원되는 녹화 형식이 없습니다.');
  const ext = mime.indexOf('mp4') === 0 || mime.indexOf('video/mp4')===0 ? 'mp4' : 'webm';
  const filename = 'kvideo_export_' + Date.now() + '.' + ext;
  updateExportNote(filename);

  const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: (width>=1920?16000000:10000000) });
  const chunks = [];
  rec.ondataavailable = function(e){ if(e.data && e.data.size>0) chunks.push(e.data); };

  let settled = false;
  const finishPromise = new Promise(function(resolve, reject){
    rec.onstop = function(){ resolve(); };
    rec.onerror = function(e){ reject((e && e.error) || new Error('녹화 오류')); };
  });

  pause();
  state.playhead = 0;
  const first = state.clips[0];
  await new Promise(function(res){ seekSource(first.sourceId, first.in, res); });

  const videoTrack = stream.getVideoTracks()[0];
  rec.start(200);
  let lastProgress = performance.now();
  const watchdog = setInterval(function(){
    if(performance.now() - lastProgress > 6000){
      clearInterval(watchdog);
      try{ rec.stop(); }catch(e){}
    }
  }, 1000);

  state.isPlaying = true;
  state.activeIdx = 0;
  ensureAudioGraph();
  if(activeEl) activeEl.play().catch(function(){});
  showExportOverlay(true, '녹화 중... 0%', 0);

  let finished = false;
  function finalizeRec(){
    if(finished) return;
    finished = true;
    state.isPlaying = false;
    clearInterval(watchdog);
    try{ rec.stop(); }catch(e){}
  }

  function frameStep(){
    if(!state.isPlaying) return;
    const c = state.clips[state.activeIdx];
    if(!c){ finalizeRec(); return; }
    const v = activeEl;
    if(!v){ finalizeRec(); return; }
    const offset = v.currentTime - c.in;
    const f = clipFadeFactor(c, offset);
    octx.fillStyle = '#000'; octx.fillRect(0,0,width,height);
    const vw = v.videoWidth||width, vh = v.videoHeight||height;
    const scale = Math.min(width/vw, height/vh) || 1;
    const dw = vw*scale, dh = vh*scale;
    try{ octx.drawImage(v, (width-dw)/2, (height-dh)/2, dw, dh); }catch(e){}
    if(f<0.999){ octx.fillStyle = 'rgba(0,0,0,'+(1-f)+')'; octx.fillRect(0,0,width,height); }
    if(videoTrack && videoTrack.requestFrame) videoTrack.requestFrame();
    applyAudioLevel(f * ((c.volume==null?1:c.volume)));
    lastProgress = performance.now();

    state.playhead = clipStart(state.activeIdx) + offset;
    const pct = dur>0 ? Math.min(100, Math.round(state.playhead/dur*100)) : 100;
    showExportOverlay(true, '녹화 중... ' + pct + '%', pct);

    if(v.currentTime >= c.out - 0.04 || v.ended){
      const nextIdx = state.activeIdx + 1;
      if(nextIdx >= state.clips.length){ finalizeRec(); return; }
      const next = state.clips[nextIdx];
      state.activeIdx = nextIdx;
      const continuous = next.sourceId === c.sourceId && Math.abs(next.in - c.out) < 0.06;
      if(continuous){
        requestAnimationFrame(frameStep);
      } else {
        const f0 = clipFadeFactor(next, 0);
        seekSource(next.sourceId, next.in, function(){
          if(activeEl) activeEl.play().catch(function(){});
          requestAnimationFrame(frameStep);
        }, f0);
      }
      return;
    }
    requestAnimationFrame(frameStep);
  }
  requestAnimationFrame(frameStep);

  await finishPromise;
  const blob = new Blob(chunks, { type: ext==='mp4' ? 'video/mp4' : 'video/webm' });
  downloadBlob(blob, filename);
  return filename;
}

   INIT
   ========================================================= */
function init(){
  resizeCanvas();
  recomputeZoomBounds();
  state.pxPerSec = state.minPxPerSec;
  renderTimeline();
  updatePlayIcon();
  updatePlaceholder();
}
init();

})();
